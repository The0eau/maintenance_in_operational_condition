
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Page de garde</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;700&display=swap');

        body {
            font-family: 'Roboto', sans-serif;
            background: linear-gradient(to right, #fdfbfb, #ebedee);
            color: #333;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        .container {
            text-align: center;
        }

        h1 {
            font-size: 3rem;
            font-weight: 300;
            margin-bottom: 50px;
            letter-spacing: 2px;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 30px;
        }

        .card {
            background-color: white;
            padding: 40px;
            border-radius: 15px;
            text-decoration: none;
            color: #333;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            will-change: transform;
        }

        .card:hover {
            transform: translateY(-10px);
            box-shadow: 0 15px 30px rgba(0,0,0,0.15);
        }

        .card h2 {
            font-size: 1.5rem;
            font-weight: 400;
            margin: 0;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Home page cours maintien en condition opératyionnelle</h1>
        <div class="grid">
            <a href="../modules/td_1.html" class="card">
                <h2>TD 1</h2>
            </a>
            <a href="../modules/td_2.html" class="card">
                <h2>TD 2</h2>
            </a>
            <a href="../modules/td_3.html" class="card">
                <h2>TD 3</h2>
            </a>
            <a href="../modules/td_4.html" class="card">
                <h2>TD 4</h2>
            </a>
        </div>
    </div>
</body>
</html>
